<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍💼 Admin Dashboard</h1>
            <div>
                <span>Welcome, {{ session.username }}</span> | 
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Merchants</h3>
                <p>{{ total_merchants }}</p>
            </div>
            <div class="stat-card">
                <h3>Total Customers</h3>
                <p>{{ total_customers }}</p>
            </div>
            <div class="stat-card">
                <h3>Total Products</h3>
                <p>{{ total_products }}</p>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p>₹{{ total_revenue }}</p>
            </div>
        </div>

        <div class="menu">
            <a href="/admin/users" class="btn">👥 Manage Users</a>
            <a href="/admin/inventory" class="btn">📦 View All Inventory</a>
            <a href="/admin/all_sales" class="btn">💰 All Sales</a>
            <a href="/admin/analytics" class="btn">📊 Analytics Dashboard</a>
        </div>
    </div>
</body>
</html>
