<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Customer Dashboard</h1>
            <div>
                <span>Welcome, {{ session.username }}</span> | 
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="menu">
            <a href="/customer/products" class="btn">🛍️ Browse Products</a>
            <a href="/customer/cart" class="btn">🛒 My Cart</a>
            <a href="/customer/my_orders" class="btn">📦 My Orders</a>
        </div>

        <div class="welcome-section">
            <h2>Welcome to Our Store!</h2>
            <p>Browse our wide range of products and place your orders easily.</p>
        </div>
    </div>
</body>
</html>
