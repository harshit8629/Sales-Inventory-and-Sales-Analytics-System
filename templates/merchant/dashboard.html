<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏬 Merchant Dashboard</h1>
            <div>
                <span>Welcome, {{ session.username }}</span> | 
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>My Products</h3>
                <p>{{ my_products }}</p>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p>₹{{ my_revenue }}</p>
            </div>
            <div class="stat-card">
                <h3>Total Sales</h3>
                <p>{{ my_sales }}</p>
            </div>
        </div>

        <div class="menu">
            <a href="/merchant/inventory" class="btn">📦 My Inventory</a>
            <a href="/merchant/sell" class="btn">💰 Sell Product</a>
            <a href="/merchant/my_sales" class="btn">📊 My Sales History</a>
        </div>
    </div>
</body>
</html>
